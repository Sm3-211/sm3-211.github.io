<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" type="image/x-icon" href="/files/favicon.ico">
</head>
<body>

<nav>
    <div class="nav-logo" id="themeToggle" title="Toggle theme"></div>

    <div class="nav-links">
        <a href="../index.html" class="active">homepage</a>
        <a href="../projects.html">projects</a>
        <a href="../about.html">about</a>
    </div>
</nav>

<script>
(() => {
    const root = document.documentElement;
    const toggle = document.getElementById("themeToggle");

    if (localStorage.getItem("theme") === "light") {
        root.setAttribute("data-theme", "light");
    }

    toggle.addEventListener("click", () => {
        if (root.getAttribute("data-theme") === "light") {
            root.removeAttribute("data-theme");
            localStorage.removeItem("theme");
        } else {
            root.setAttribute("data-theme", "light");
            localStorage.setItem("theme", "light");
        }
    });
})();
</script>

<div class="home">
    <header>
        <h1>Mustafa Akbar</h1>
        <p class="subtitle">Game Designer</p>
    </header>

    <div class="video-container">
        <iframe
            src="https://www.youtube-nocookie.com/embed/xcbQzDCbr6g?si=GJ0fyuXgSL8s6NCU"
            title="YouTube video player"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; web-share"
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen>
        </iframe>
    </div>
</div>

<footer>
    © <span id="year"></span> Mustafa Akbar
</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
